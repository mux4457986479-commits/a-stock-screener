<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>A股低价股筛选</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070b14;color:#dde5f5;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;padding-bottom:38px}
.header{background:#0d1526;padding:16px 16px 12px;text-align:center;border-bottom:1px solid #1e3158;position:sticky;top:0;z-index:5}
.header h1{font-size:1.08rem;margin-bottom:4px}.header p{color:#6b82a8;font-size:.7rem;line-height:1.45}
.body{max-width:760px;margin:0 auto;padding:14px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
.stat{background:#0d1526;border:1px solid #1e3158;border-radius:10px;padding:10px 8px;text-align:center}
.stat-label{color:#6b82a8;font-size:.62rem;margin-bottom:5px}.stat-val{color:#f0a500;font-size:1.02rem;font-weight:700}
.notice{background:#0d1526;border:1px solid #1e3158;border-left:3px solid #f0a500;border-radius:12px;color:#8a97b0;font-size:.72rem;line-height:1.65;margin-bottom:14px;padding:11px 12px}
.notice.warn{border-left-color:#ff5c7d;color:#ff9ab0}
.tabs{display:flex;background:#0d1526;border:1px solid #1e3158;border-radius:10px;margin-bottom:14px;overflow:hidden}
.tab{flex:1;border:0;border-right:1px solid #1e3158;background:transparent;color:#6b82a8;cursor:pointer;padding:9px 4px}
.tab:last-child{border-right:0}.tab span{display:block;font-size:.72rem}.tab strong{display:block;margin-top:3px;font-size:.9rem}
.tab.active{background:rgba(240,165,0,.1);color:#f0a500}
.panel{display:none}.panel.active{display:block}
.filter-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}.filter-row::-webkit-scrollbar{display:none}
.tag{flex-shrink:0;background:#0d1526;border:1px solid #1e3158;color:#6b82a8;font-size:.7rem;padding:6px 11px;border-radius:20px;cursor:pointer;white-space:nowrap}
.tag.active{background:rgba(240,165,0,.12);border-color:rgba(240,165,0,.4);color:#f0a500}
.card{background:#0d1526;border:1px solid #1e3158;border-radius:12px;margin-bottom:10px;overflow:hidden}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:12px 13px 8px;cursor:pointer}
.stock-main{min-width:0}.name-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px}.rank{color:#f0a500;font-size:.7rem;font-weight:700}
.name{font-weight:700;font-size:.95rem}.code{color:#6b82a8;font-size:.66rem}.badges,.concept-row{display:flex;gap:5px;flex-wrap:wrap}
.badges{margin-top:7px}.concept-row{margin:0 13px 10px}
.badge,.concept{font-size:.6rem;padding:2px 7px;border-radius:20px;border:1px solid}
.b-price{color:#f0a500;border-color:rgba(240,165,0,.3);background:rgba(240,165,0,.08)}.b-hot{color:#ff5c7d;border-color:rgba(255,92,125,.3);background:rgba(255,92,125,.08)}
.b-tech{color:#4fa3ff;border-color:rgba(79,163,255,.3);background:rgba(79,163,255,.08)}.b-fund{color:#b06aff;border-color:rgba(176,106,255,.3);background:rgba(176,106,255,.08)}
.b-basic{color:#ff9f43;border-color:rgba(255,159,67,.3);background:rgba(255,159,67,.08)}.concept{color:#00e090;border-color:rgba(0,224,144,.25);background:rgba(0,224,144,.07)}
.concept-muted{color:#6b82a8;border-color:#1e3158;background:#111e35}.price-block{text-align:right;flex-shrink:0}.price{font-size:1.04rem;font-weight:700}.pct{font-size:.82rem;margin-top:3px}
.up{color:#ff5c7d;font-weight:700}.down{color:#00e090;font-weight:700}.flat{color:#6b82a8;font-weight:700}
.score-bar-wrap{margin:0 13px 9px;background:#111e35;border-radius:6px;height:5px;overflow:hidden}.score-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#f0a500,#ffd166)}
.quick-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:7px;padding:0 13px 12px}.quick-grid div{background:#111e35;border-radius:8px;padding:7px 8px;min-width:0}
.quick-grid span{display:block;color:#6b82a8;font-size:.58rem;margin-bottom:3px}.quick-grid strong{display:block;font-size:.74rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-detail{display:none;padding:0 13px 13px;border-top:1px solid #1e3158}.card-detail.open{display:block}
.total-row{display:flex;justify-content:space-between;align-items:center;background:rgba(240,165,0,.07);border:1px solid rgba(240,165,0,.2);border-radius:8px;padding:8px 12px;margin:10px 0}
.total-label{font-size:.75rem;color:#f0a500}.total-val{font-size:1.02rem;font-weight:700;color:#f0a500}
.dim-rows{margin-bottom:10px}.dim-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}.dim-name{width:38px;color:#6b82a8;flex-shrink:0;font-size:.66rem}
.dim-bg{flex:1;height:5px;background:#172340;border-radius:3px;overflow:hidden}.dim-fill{height:100%;border-radius:3px}.dim-num{width:28px;text-align:right;font-size:.68rem;font-weight:700}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}.di{background:#111e35;border-radius:8px;padding:8px 10px;min-width:0}.di-l{color:#6b82a8;font-size:.62rem;margin-bottom:3px}.di-v{font-size:.8rem;font-weight:700;overflow-wrap:anywhere}
.link-btn{display:block;margin-top:10px;background:linear-gradient(135deg,#f0a500,#e09000);color:#000;text-align:center;text-decoration:none;border-radius:10px;padding:10px;font-size:.82rem;font-weight:700}
.empty{text-align:center;color:#6b82a8;font-size:.82rem;padding:30px 0}footer{color:#6b82a8;font-size:.66rem;line-height:1.6;padding:12px 2px 0;text-align:center}
@media(min-width:721px){.list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.card{margin-bottom:0}}
@media(max-width:430px){.quick-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>
<body>
<div class="header">
  <h1>A股低价股筛选</h1>
  <p>GitHub Pages 固定链接 | 自动更新数据 | 手机收藏可长期使用</p>
</div>
<div class="body">
  <div class="stats">
    <div class="stat"><div class="stat-label">行情池</div><div class="stat-val" id="sAll">--</div></div>
    <div class="stat"><div class="stat-label">候选合计</div><div class="stat-val" id="sPass">--</div></div>
    <div class="stat"><div class="stat-label">数据时间</div><div class="stat-val" id="sTime">--</div></div>
  </div>
  <div class="notice" id="notice">正在读取 data.json...</div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
  <footer>低价不等于低风险。本页仅供研究，不构成投资建议。点击卡片可展开详情。</footer>
</div>

<script>
var DATA=null;
var activeBucket='10';
var EM_ENDPOINTS=[
  'https://92.push2.eastmoney.com/api/qt/clist/get',
  'https://push2.eastmoney.com/api/qt/clist/get',
  'https://7.push2.eastmoney.com/api/qt/clist/get',
  'https://60.push2.eastmoney.com/api/qt/clist/get',
  'https://72.push2.eastmoney.com/api/qt/clist/get'
];
var EM_DATACENTER='https://datacenter-web.eastmoney.com/api/data/v1/get';
var SINA_ENDPOINT='https://vip.stock.finance.sina.com.cn/quotes_service/api/json_v2.php/Market_Center.getHQNodeData';

function moneyYi(v){return v==null?'—':(v/100000000).toFixed(2)+'亿'}
function moneyWan(v){return v==null?'—':(v/10000).toFixed(0)+'万'}
function num(v,d){return v==null||isNaN(v)?'—':Number(v).toFixed(d==null?2:d)}
function chipText(v){return v==null||isNaN(v)?'暂无':Number(v).toFixed(2)+'%'}
function cls(v){return (v||0)>0?'up':(v||0)<0?'down':'flat'}
function esc(s){return String(s||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]})}
function stockUrl(code){return 'https://quote.eastmoney.com/'+(String(code).startsWith('6')?'sh':'sz')+code+'.html'}
function fmtTime(s){if(!s)return '--';var d=new Date(s);if(isNaN(d))return s.slice(5,16);return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}

async function loadData(){
  try{
    var resp=await fetch('data.json?ts='+Date.now(),{cache:'no-store'});
    if(!resp.ok)throw new Error('data.json '+resp.status);
    DATA=await resp.json();
    var empty=!DATA.ok&&(!DATA.total_count||DATA.total_count===0);
    if(empty){
      document.getElementById('notice').className='notice warn';
      document.getElementById('notice').textContent='云端数据本次更新失败，正在尝试用当前浏览器直接读取东方财富...';
      DATA=await fetchLiveData();
    }
    render();
  }catch(e){
    try{
      document.getElementById('notice').className='notice warn';
      document.getElementById('notice').textContent='缓存数据读取失败，正在尝试浏览器实时读取东方财富...';
      DATA=await fetchLiveData();
      render();
    }catch(err){
      document.getElementById('notice').className='notice warn';
      document.getElementById('notice').textContent='数据读取失败：'+err.message+'。请稍后刷新页面。';
    }
  }
}

async function fetchLiveData(){
  var stocks=await fetchEastmoneyBrowser();
  var buckets={};
  ['10','5','2'].forEach(function(k){
    var th=Number(k);
    buckets[k]=stocks.filter(function(s){return accepted(s,th)}).map(function(s){
      var copy=Object.assign({},s);
      copy.score=scoreStock(copy);
      copy.concepts=[];
      return copy;
    }).sort(function(a,b){return b.score-a.score}).slice(0,120);
  });
  return {
    ok:true,
    updated_at:new Date().toISOString(),
    generated_at:new Date().toISOString(),
    source:'eastmoney-browser-fallback',
    total_count:stocks.length,
    message:'云端缓存不可用，当前为浏览器实时兜底数据。',
    buckets:buckets
  };
}

async function fetchEastmoneyBrowser(){
  var lastErr=null;
  try{return await fetchDatacenterBrowser()}catch(e){lastErr=e}
  try{return await fetchSinaBrowser()}catch(e){lastErr=e}
  for(var i=0;i<EM_ENDPOINTS.length;i++){
    try{return await fetchByEndpoint(EM_ENDPOINTS[i])}catch(e){lastErr=e}
  }
  throw lastErr||new Error('行情接口不可用');
}

async function fetchByEndpoint(base){
  var all=[];
  var pageSize=300;
  for(var page=1;page<=25;page++){
    var payload=await jsonp(base,{
      pn:page,pz:pageSize,po:1,np:1,fltt:2,invt:2,fid:'f3',
      fs:'m:1+t:2,m:1+t:23,m:0+t:6,m:0+t:80',
      fields:'f2,f3,f5,f6,f8,f9,f10,f12,f14,f20,f21,f23,f62,f115',
      _:Date.now()
    });
    var rows=payload&&payload.data&&payload.data.diff;
    if(!rows||!rows.length)break;
    all=all.concat(rows.map(parseLiveStock).filter(Boolean));
    if(rows.length<pageSize)break;
    await sleep(60);
  }
  if(!all.length)throw new Error('浏览器实时读取为空');
  return all;
}

function jsonp(base,params,callbackParam){
  return new Promise(function(resolve,reject){
    var cb='em_cb_'+Date.now()+'_'+Math.random().toString(16).slice(2);
    params[callbackParam||'cb']=cb;
    var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k])}).join('&');
    var script=document.createElement('script');
    var timer=setTimeout(function(){cleanup();reject(new Error('东方财富接口超时'))},12000);
    function cleanup(){clearTimeout(timer);try{delete window[cb]}catch(e){window[cb]=undefined}if(script.parentNode)script.parentNode.removeChild(script)}
    window[cb]=function(data){cleanup();resolve(data)};
    script.onerror=function(){cleanup();reject(new Error('东方财富接口加载失败'))};
    script.src=base+'?'+qs;
    document.body.appendChild(script);
  });
}

function parseLiveStock(x){
  var price=toNum(x.f2),pct=toNum(x.f3),code=String(x.f12||''),name=String(x.f14||'');
  if(!code||!name||price==null||pct==null)return null;
  return {code:code,name:name,price:price,pct:pct,amount:toNum(x.f6),turnover:toNum(x.f8),vol_ratio:toNum(x.f10),pe:toNum(x.f9),pe_ttm:toNum(x.f115),pb:toNum(x.f23),total_cap:toNum(x.f20),float_cap:toNum(x.f21),main_net:toNum(x.f62),chip_concentration_90:null,concepts:[]};
}

async function fetchDatacenterBrowser(){
  var all=[];
  var pageSize=300;
  for(var page=1;page<=25;page++){
    var payload=await jsonp(EM_DATACENTER,{
      sortColumns:'SECURITY_CODE',
      sortTypes:'1',
      pageSize:pageSize,
      pageNumber:page,
      reportName:'RPT_DMSK_TS_STOCKNEW',
      quoteColumns:'f2~01~SECURITY_CODE~CLOSE_PRICE,f8~01~SECURITY_CODE~TURNOVERRATE,f3~01~SECURITY_CODE~CHANGE_RATE,f9~01~SECURITY_CODE~PE_DYNAMIC,f10~01~SECURITY_CODE~VOLUME_RATIO,f6~01~SECURITY_CODE~AMOUNT,f23~01~SECURITY_CODE~PB',
      quoteType:'0',
      columns:'ALL',
      filter:'',
      token:'894050c76af8597a853f5b408b759f5d',
      _:Date.now()
    },'callback');
    var rows=payload&&payload.result&&payload.result.data;
    if(!rows||!rows.length)break;
    all=all.concat(rows.map(parseDatacenterStock).filter(Boolean));
    if(rows.length<pageSize)break;
    await sleep(60);
  }
  if(!all.length)throw new Error('备用数据中心接口读取为空');
  return all;
}

function parseDatacenterStock(x){
  var price=toNum(x.CLOSE_PRICE),pct=toNum(x.CHANGE_RATE),code=String(x.SECURITY_CODE||''),name=String(x.SECURITY_NAME_ABBR||'');
  if(!code||!name||price==null||pct==null)return null;
  return {code:code,name:name,price:price,pct:pct,amount:toNum(x.AMOUNT),turnover:toNum(x.TURNOVERRATE),vol_ratio:toNum(x.VOLUME_RATIO),pe:toNum(x.PE_DYNAMIC),pe_ttm:null,pb:toNum(x.PB),total_cap:null,float_cap:null,main_net:toNum(x.PRIME_INFLOW),chip_concentration_90:null,concepts:[]};
}

async function fetchSinaBrowser(){
  var all=[];
  var pageSize=300;
  for(var page=1;page<=25;page++){
    var payload=await jsonp(SINA_ENDPOINT,{
      page:page,
      num:pageSize,
      sort:'symbol',
      asc:1,
      node:'hs_a',
      symbol:'',
      _s_r_a:'page',
      _:Date.now()
    },'callback');
    var rows=Array.isArray(payload)?payload:[];
    if(!rows.length)break;
    all=all.concat(rows.map(parseSinaStock).filter(Boolean));
    if(rows.length<pageSize)break;
    await sleep(60);
  }
  if(!all.length)throw new Error('新浪行情接口读取为空');
  return all;
}

function parseSinaStock(x){
  var symbol=String(x.symbol||'');
  if(!(symbol.indexOf('sh')===0||symbol.indexOf('sz')===0))return null;
  var price=toNum(x.trade),pct=toNum(x.changepercent),code=String(x.code||symbol.slice(2)),name=String(x.name||'');
  if(!code||!name||price==null||pct==null)return null;
  var total=toNum(x.mktcap),floatCap=toNum(x.nmc);
  return {code:code,name:name,price:price,pct:pct,amount:toNum(x.amount),turnover:toNum(x.turnoverratio),vol_ratio:toNum(x.volumeratio),pe:toNum(x.per),pe_ttm:null,pb:toNum(x.pb),total_cap:total==null?null:total*10000,float_cap:floatCap==null?null:floatCap*10000,main_net:null,chip_concentration_90:null,concepts:[]};
}

function toNum(v){if(v==null||v===''||v==='-')return null;var n=Number(v);return isNaN(n)?null:n}
function accepted(s,th){
  var up=(s.name||'').toUpperCase();
  if(!(s.price>0&&s.price<th&&up.indexOf('ST')<0&&s.name.indexOf('退')<0&&s.pct>-9.5))return false;
  if(DATA&&DATA.min_volume_ratio!=null&&(s.vol_ratio==null||s.vol_ratio<=DATA.min_volume_ratio))return false;
  if(DATA&&DATA.chip_threshold!=null&&DATA.require_chip&&s.chip_concentration_90==null)return false;
  if(DATA&&DATA.chip_threshold!=null&&s.chip_concentration_90!=null&&s.chip_concentration_90>DATA.chip_threshold)return false;
  return true;
}
function scoreStock(s){
  var amountScore=Math.min((s.amount||0)/100000000,3)*16;
  var turnoverScore=Math.min((s.turnover||0),8)*4;
  var inflowScore=Math.max(Math.min((s.main_net||0)/10000000,8),-8)*2;
  var pb=(s.pb&&s.pb>0)?s.pb:3;
  var pe=(s.pe&&s.pe>0)?s.pe:s.pe_ttm;
  pe=(pe&&pe>0)?pe:50;
  var valuationScore=Math.max(0,30-pb*4-pe*.18);
  var momentumScore=8-Math.abs(s.pct||0)*.7;
  var capScore=Math.min((s.float_cap||0)/10000000000,2)*4;
  return Math.round((amountScore+turnoverScore+inflowScore+valuationScore+momentumScore+capScore)*100)/100;
}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}

function render(){
  var buckets=DATA.buckets||{};
  var total=(buckets['10']||[]).length+(buckets['5']||[]).length+(buckets['2']||[]).length;
  document.getElementById('sAll').textContent=DATA.total_count||0;
  document.getElementById('sPass').textContent=total;
  document.getElementById('sTime').textContent=fmtTime(DATA.updated_at);
  var notice=document.getElementById('notice');
  notice.className=DATA.ok?'notice':'notice warn';
  var chipRule=DATA.chip_threshold!=null
    ?(DATA.require_chip
      ?'；90%筹码集中度≤'+num(DATA.chip_threshold,2)+'%'
      :'；筹码数据可用时要求90%集中度≤'+num(DATA.chip_threshold,2)+'%，暂无时保留')
    :'';
  var vrRule=DATA.min_volume_ratio!=null?'；量比>'+num(DATA.min_volume_ratio,2):'';
  notice.textContent=(DATA.ok?'规则：':'提示：')+(DATA.message||'')+' 低门槛筛选：10元/5元/2元以下，剔除ST、退市和跌停附近个股'+chipRule+vrRule+'；成交额、换手率、估值、主力净流入用于评分排序。';

  var keys=['10','5','2'];
  document.getElementById('tabs').innerHTML=keys.map(function(k){
    return '<button class="tab '+(k===activeBucket?'active':'')+'" onclick="switchBucket(\''+k+'\',this)"><span>'+k+'元以下</span><strong>'+((buckets[k]||[]).length)+'</strong></button>';
  }).join('');
  document.getElementById('panels').innerHTML=keys.map(function(k){
    return '<section class="panel '+(k===activeBucket?'active':'')+'" id="p'+k+'">'+sortRow()+renderList(buckets[k]||[])+'</section>';
  }).join('');
}

function sortRow(){
  return `<div class="filter-row">
    <button class="tag active" onclick="sortCards(this,'score')">综合评分</button>
    <button class="tag" onclick="sortCards(this,'price')">价格从低</button>
    <button class="tag" onclick="sortCards(this,'pct')">涨幅优先</button>
    <button class="tag" onclick="sortCards(this,'amount')">成交额</button>
    <button class="tag" onclick="sortCards(this,'turnover')">换手率</button>
    <button class="tag" onclick="sortCards(this,'volratio')">量比</button>
    <button class="tag" onclick="sortCards(this,'chip')">筹码集中</button>
  </div>`;
}

function renderList(stocks){
  if(!stocks.length)return '<div class="list"><div class="empty">没有符合条件的股票</div></div>';
  return '<div class="list">'+stocks.map(card).join('')+'</div>';
}

function card(s,i){
  var pct=(s.pct>0?'+':'')+num(s.pct,2)+'%';
  var concepts=(s.concepts&&s.concepts.length)?s.concepts:[];
  var conceptHtml=concepts.length?concepts.map(function(c){return '<span class="concept">'+esc(c)+'</span>'}).join(''):'<span class="concept concept-muted">暂无概念</span>';
  var scoreWidth=Math.max(4,Math.min(100,s.score||0));
  var active=Math.min(100,Math.max(0,(s.amount||0)/2000000));
  var fund=Math.min(100,Math.max(0,40+(s.main_net||0)/2000000));
  var value=Math.min(100,Math.max(0,80-(((s.pe||s.pe_ttm)||50)*.35)-((s.pb||3)*4)));
  var tech=Math.min(100,Math.max(0,(s.turnover||0)*10+Math.abs(s.pct||0)*3));
  return '<div class="card" data-score="'+(s.score||0)+'" data-price="'+(s.price||0)+'" data-pct="'+(s.pct||0)+'" data-amount="'+(s.amount||0)+'" data-turnover="'+(s.turnover||0)+'" data-volratio="'+(s.vol_ratio||0)+'" data-chip="'+(s.chip_concentration_90==null?999:s.chip_concentration_90)+'">'
    +'<div class="card-top" onclick="toggleCard(this)">'
      +'<div class="stock-main"><div class="name-row"><span class="rank">#'+(i+1)+'</span><span class="name">'+esc(s.name)+'</span><span class="code">'+esc(s.code)+'</span></div><div class="badges">'+badge(s)+'</div></div>'
      +'<div class="price-block"><div class="price">'+num(s.price,2)+'</div><div class="pct '+cls(s.pct)+'">'+pct+'</div></div>'
    +'</div>'
    +'<div class="score-bar-wrap"><div class="score-bar-fill" style="width:'+scoreWidth+'%"></div></div>'
    +'<div class="concept-row">'+conceptHtml+'</div>'
    +'<div class="quick-grid"><div><span>成交额</span><strong>'+moneyYi(s.amount)+'</strong></div><div><span>换手</span><strong>'+num(s.turnover,2)+'%</strong></div><div><span>量比</span><strong>'+num(s.vol_ratio,2)+'</strong></div><div><span>筹码集中</span><strong>'+chipText(s.chip_concentration_90)+'</strong></div><div><span>主力</span><strong class="'+cls(s.main_net)+'">'+moneyWan(s.main_net)+'</strong></div></div>'
    +'<div class="card-detail">'
      +'<div class="total-row"><span class="total-label">综合评分</span><span class="total-val">'+num(s.score,2)+' / 100</span></div>'
      +'<div class="dim-rows">'+drow('活跃',active,'#4fa3ff')+drow('资金',fund,'#b06aff')+drow('估值',value,'#ff9f43')+drow('技术',tech,'#f0a500')+'</div>'
      +'<div class="detail-grid">'
        +di('现价',num(s.price,2))+di('涨跌幅','<span class="'+cls(s.pct)+'">'+pct+'</span>')
        +di('成交额',moneyYi(s.amount))+di('换手率',num(s.turnover,2)+'%')
        +di('量比',num(s.vol_ratio,2))
        +di('90%筹码集中度',chipText(s.chip_concentration_90))
        +di('动态PE',num(s.pe,2))+di('TTM PE',num(s.pe_ttm,2))
        +di('PB',num(s.pb,2))+di('流通市值',moneyYi(s.float_cap))
        +di('主力净流入','<span class="'+cls(s.main_net)+'">'+moneyWan(s.main_net)+'</span>')+di('相关概念',concepts.length?concepts.map(esc).join(' / '):'暂无')
      +'</div><a class="link-btn" target="_blank" href="'+stockUrl(s.code)+'">打开东方财富个股页</a></div></div>';
}

function badge(s){
  var b=['<span class="badge b-price">低价</span>'];
  if(s.price<2)b.push('<span class="badge b-hot">2元内</span>');else if(s.price<5)b.push('<span class="badge b-hot">5元内</span>');
  if((s.vol_ratio||0)>1.5)b.push('<span class="badge b-tech">量比&gt;1.5</span>');
  if(s.chip_concentration_90!=null&&s.chip_concentration_90<=12)b.push('<span class="badge b-fund">筹码≤12%</span>');
  if((s.turnover||0)>=3)b.push('<span class="badge b-tech">活跃换手</span>');
  if((s.amount||0)>=100000000)b.push('<span class="badge b-tech">成交过亿</span>');
  if((s.main_net||0)>0)b.push('<span class="badge b-fund">主力净入</span>');
  if(s.pe>0&&s.pe<30)b.push('<span class="badge b-basic">PE较低</span>');
  if(s.pb>0&&s.pb<2)b.push('<span class="badge b-basic">PB较低</span>');
  return b.slice(0,5).join('');
}

function switchBucket(k,el){activeBucket=k;document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});el.classList.add('active');document.getElementById('p'+k).classList.add('active')}
function sortCards(el,key){var panel=el.closest('.panel');panel.querySelectorAll('.tag').forEach(function(t){t.classList.remove('active')});el.classList.add('active');var list=panel.querySelector('.list');var cards=Array.prototype.slice.call(list.querySelectorAll('.card'));cards.sort(function(a,b){var av=parseFloat(a.dataset[key]||0),bv=parseFloat(b.dataset[key]||0);return (key==='price'||key==='chip')?av-bv:bv-av});cards.forEach(function(c){list.appendChild(c)})}
function toggleCard(topEl){topEl.parentElement.querySelector('.card-detail').classList.toggle('open')}
function drow(l,v,c){v=Math.max(0,Math.min(100,Math.round(v)));return '<div class="dim-row"><div class="dim-name">'+l+'</div><div class="dim-bg"><div class="dim-fill" style="width:'+v+'%;background:'+c+'"></div></div><div class="dim-num" style="color:'+c+'">'+v+'</div></div>'}
function di(l,v){return '<div class="di"><div class="di-l">'+l+'</div><div class="di-v">'+v+'</div></div>'}
loadData();
</script>
</body>
</html>
