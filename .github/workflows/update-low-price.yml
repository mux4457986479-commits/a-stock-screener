name: Update A-share low price data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 1-7 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install chip data dependency
        run: python -m pip install --upgrade akshare py-mini-racer

      - name: Fetch Eastmoney data
        run: python scripts/update_data.py --output data.json --limit 120 --chip-threshold 12

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update low price A-share data"
          file_pattern: data.json
